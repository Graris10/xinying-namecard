<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ke Xinying — Leap Philanthropy</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #2d7a3a;
      --green-dark: #1e5429;
      --green-mid: #52b788;
      --green-light: #e8f0ec;
      --white: #ffffff;
      --off-white: #f4f7f5;
      --text: #1a1a1a;
      --muted: #6b7a72;
      --border: #d0e4d8;
      --shadow: 0 8px 48px rgba(45,106,79,0.13);
    }

    html, body {
      min-height: 100vh;
      background: var(--off-white);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Montserrat', sans-serif;
      padding: 2rem 1rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, #b8d4c4 1px, transparent 1px);
      background-size: 24px 24px;
      opacity: 0.45;
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 100%;
      max-width: 400px;
      overflow: hidden;
      box-shadow: var(--shadow);
      animation: rise 0.8s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes rise {
      from { opacity:0; transform:translateY(24px) scale(0.97); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }

    .card-bar {
      height: 5px;
      background: linear-gradient(90deg, var(--green-dark), var(--green), var(--green-mid));
    }

    .card-header {
      padding: 1.75rem 2rem 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .header-logo {
      margin-bottom: 1.4rem;
      animation: rise 0.8s 0.05s both;
    }
    .header-logo a {
      display: inline-block;
      transition: opacity 0.2s, transform 0.2s;
    }
    .header-logo a:hover { opacity: 0.8; transform: scale(1.03); }
    .header-logo img {
      height: 52px;
      width: auto;
      object-fit: contain;
      display: block;
    }

    .photo-ring {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      padding: 3px;
      background: linear-gradient(135deg, var(--green-dark), var(--green-mid));
      margin-bottom: 1.1rem;
      animation: rise 0.8s 0.1s both;
    }
    .photo-ring img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      object-position: center top;
      display: block;
      border: 2px solid var(--white);
    }

    .name {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.01em;
      line-height: 1.2;
      margin-bottom: 0.35rem;
      animation: rise 0.8s 0.15s both;
    }

    .role {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--green);
      line-height: 1.5;
      padding: 0 1rem;
      animation: rise 0.8s 0.18s both;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 1.4rem 2rem;
      animation: rise 0.8s 0.22s both;
    }

    .contacts {
      padding: 0 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      animation: rise 0.8s 0.26s both;
    }

    /* Default state */
    .contact-item {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      padding: 0.75rem 0.85rem;
      border-radius: 10px;
      text-decoration: none;
      border: 1px solid var(--border);
      background: var(--white);
      transition: background 0.18s, border-color 0.18s, transform 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    /* Hover (desktop) and active/focus (mobile tap) — solid green fill */
    .contact-item:hover,
    .contact-item:active,
    .contact-item:focus {
      background: var(--green);
      border-color: var(--green);
      transform: translateX(3px);
      outline: none;
    }

    .contact-item:hover .contact-icon,
    .contact-item:active .contact-icon,
    .contact-item:focus .contact-icon {
      background: rgba(255,255,255,0.2);
    }

    .contact-item:hover .contact-icon svg,
    .contact-item:active .contact-icon svg,
    .contact-item:focus .contact-icon svg {
      fill: var(--white);
    }

    .contact-item:hover .contact-label,
    .contact-item:active .contact-label,
    .contact-item:focus .contact-label {
      color: rgba(255,255,255,0.65);
    }

    .contact-item:hover .contact-value,
    .contact-item:active .contact-value,
    .contact-item:focus .contact-value {
      color: var(--white);
    }

    .contact-icon {
      width: 34px; height: 34px;
      border-radius: 9px;
      background: var(--green-light);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.18s;
    }
    .contact-icon svg { width: 15px; height: 15px; fill: var(--green); transition: fill 0.18s; }

    .contact-text {
      display: flex;
      flex-direction: column;
      gap: 0.05rem;
      min-width: 0;
    }
    .contact-label {
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
      transition: color 0.18s;
    }
    .contact-value {
      font-size: 0.82rem;
      color: var(--text);
      font-weight: 400;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.18s;
    }

    .card-footer {
      margin: 1.4rem 2rem 0;
      padding: 1.2rem 0 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.65rem;
      animation: rise 0.8s 0.4s both;
    }

    .footer-logo a {
      display: inline-block;
      transition: opacity 0.2s, transform 0.2s;
    }
    .footer-logo a:hover { opacity: 0.8; transform: scale(1.03); }
    .footer-logo img {
      height: 40px;
      width: auto;
      object-fit: contain;
      display: block;
    }

    .footer-email {
      font-size: 0.71rem;
      color: var(--muted);
      letter-spacing: 0.02em;
      text-align: center;
    }
    .footer-email a {
      color: var(--green);
      text-decoration: none;
      font-weight: 600;
    }
    .footer-email a:hover { text-decoration: underline; }

    @media (max-width: 420px) {
      .card-header { padding: 1.5rem 1.5rem 0; }
      .contacts { padding: 0 0.85rem; }
      .divider { margin: 1.2rem 1.5rem; }
      .card-footer { margin: 1.2rem 1.5rem 0; }
    }
  </style>
</head>
