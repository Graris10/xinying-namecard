<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ke Xinying — Leap Philanthropy</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f5f2;
      --white: #ffffff;
      --text: #1a1a1a;
      --muted: #888480;
      --accent: #2d6a4f;
      --accent-light: #e8f0ec;
      --border: #e4e0da;
      --shadow: 0 4px 40px rgba(0,0,0,0.07);
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Jost', sans-serif;
      padding: 2rem 1rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, #d0c9be 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: 0.35;
      pointer-events: none;
    }

    .card {
      position: relative;
      background: var(--white);
      border-radius: 20px;
      width: 100%;
      max-width: 420px;
      padding: 3rem 2.5rem 2.5rem;
      box-shadow: var(--shadow);
      animation: rise 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--accent), #52b788);
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(24px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .avatar-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 1.5rem;
      animation: rise 0.8s 0.1s both;
    }

    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: var(--accent-light);
      border: 3px solid var(--white);
      box-shadow: 0 0 0 2px var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.2rem;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: -1px;
    }

    .identity {
      text-align: center;
      margin-bottom: 0.5rem;
      animation: rise 0.8s 0.15s both;
    }

    .name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.01em;
      line-height: 1.1;
    }

    .role {
      margin-top: 0.3rem;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      animation: rise 0.8s 0.2s both;
    }

    .company-chip {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      margin: 1.2rem auto 0;
      width: fit-content;
      padding: 0.4rem 1rem;
      background: var(--accent-light);
      border-radius: 100px;
      text-decoration: none;
      transition: background 0.2s;
      animation: rise 0.8s 0.25s both;
    }

    .company-chip:hover { background: #d4e8dc; }

    .company-chip span {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: 0.03em;
    }

    .company-chip svg {
      width: 12px; height: 12px;
      fill: var(--accent);
      flex-shrink: 0;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 2rem 0;
      animation: rise 0.8s 0.3s both;
    }

    .contacts {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      animation: rise 0.8s 0.35s both;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.85rem 1rem;
      border-radius: 12px;
      text-decoration: none;
      color: var(--text);
      border: 1px solid var(--border);
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
    }

    .contact-item:hover {
      border-color: var(--accent);
      background: var(--accent-light);
      transform: translateX(4px);
    }

    .contact-icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .contact-item:hover .contact-icon { background: white; }

    .contact-icon svg {
      width: 16px; height: 16px;
      fill: var(--accent);
    }

    .contact-text {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }

    .contact-label {
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
    }

    .contact-value {
      font-size: 0.88rem;
      color: var(--text);
      font-weight: 400;
    }

    .footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      animation: rise 0.8s 0.45s both;
    }

    @media (max-width: 440px) {
      .card { padding: 2.5rem 1.5rem 2rem; border-radius: 16px; }
    }
  </style>
</head>
<body>
